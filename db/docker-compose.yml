services:
  postgres:
    image: postgres:16
    container_name: copilot_postgres
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - copilot_pgdata:/var/lib/postgresql/data

volumes:
  copilot_pgdata: